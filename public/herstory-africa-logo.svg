<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <defs>
    <linearGradient id="africa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b5451b"/>
      <stop offset="100%" stop-color="#c8941a"/>
    </linearGradient>
  </defs>

  <!-- ── Icon Mark: Stylised Africa continent ── -->
  <g transform="translate(4, 6)">
    <path
      d="M 28,2 C 34,2 40,4 42,9 C 44,13 46,17 44,22 C 46,26 47,30 45,35 C 47,40 46,46 42,51 C 38,57 32,62 28,62 C 24,62 18,57 14,51 C 10,46 9,40 11,35 C 9,30 10,26 12,22 C 10,17 12,13 14,9 C 16,4 22,2 28,2 Z"
      fill="url(#africa-grad)"
      opacity="0.15"
    />
    <path
      d="M 28,2 C 34,2 40,4 42,9 C 44,13 46,17 44,22 C 46,26 47,30 45,35 C 47,40 46,46 42,51 C 38,57 32,62 28,62 C 24,62 18,57 14,51 C 10,46 9,40 11,35 C 9,30 10,26 12,22 C 10,17 12,13 14,9 C 16,4 22,2 28,2 Z"
      stroke="url(#africa-grad)"
      stroke-width="2"
      fill="none"
    />
    <!-- Centre dot -->
    <circle cx="28" cy="32" r="4" fill="url(#africa-grad)"/>
    <circle cx="28" cy="32" r="7" fill="none" stroke="#c8941a" stroke-width="1.2" opacity="0.5"/>
    <!-- Scatter dots -->
    <circle cx="22" cy="20" r="1.5" fill="#b5451b" opacity="0.6"/>
    <circle cx="34" cy="24" r="1.5" fill="#c8941a" opacity="0.6"/>
    <circle cx="20" cy="42" r="1.5" fill="#b5451b" opacity="0.6"/>
    <circle cx="36" cy="44" r="1.5" fill="#c8941a" opacity="0.6"/>
  </g>

  <!-- Thin separator -->
  <line x1="62" y1="12" x2="62" y2="60" stroke="currentColor" stroke-width="1" opacity="0.25"/>

  <!-- ── Wordmark — single text element, tspan handles colour split ── -->
  <text
    x="72"
    y="42"
    font-family="'Playfair Display', Georgia, serif"
    font-size="32"
    font-weight="700"
  >
    <tspan fill="#b5451b">Her</tspan><tspan fill="currentColor">Story</tspan>
  </text>

  <!-- "AFRICA" — aligned to same x as wordmark -->
  <text
    x="73"
    y="58"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10.5"
    font-weight="600"
    fill="#c8941a"
    letter-spacing="5"
  >AFRICA</text>

</svg>
