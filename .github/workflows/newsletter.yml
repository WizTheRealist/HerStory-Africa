name: Draft Newsletter

on:
  schedule:
    - cron: "0 9 1,15 * *" # 1st and 15th of every month at 9 AM UTC
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate newsletter draft
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/draft-newsletter.mjs

      - name: Commit updated newsletter log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/newsletter-log.json
          git diff --staged --quiet || git commit -m "chore: update newsletter log"
          git push

      - name: Write job summary
        run: |
          LOG=$(cat data/newsletter-log.json)
          SUBJECT=$(echo "$LOG" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const l=JSON.parse(d);const e=l.editions[l.editions.length-1];console.log(e.subject)")
          FEATURE=$(echo "$LOG" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const l=JSON.parse(d);const e=l.editions[l.editions.length-1];console.log(e.mainFeature)")
          TYPE=$(echo "$LOG" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const l=JSON.parse(d);const e=l.editions[l.editions.length-1];console.log(e.type)")
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Newsletter draft ready

          | | |
          |---|---|
          | **Subject** | $SUBJECT |
          | **Type** | $TYPE |
          | **Spotlight** | $FEATURE |

          [Review and send in Buttondown](https://buttondown.com/emails)
          EOF
