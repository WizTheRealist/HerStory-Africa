name: Suggest a Woman
description: Suggest an African woman whose story should be in the archive.
title: "Suggestion: "
labels: ["suggestion"]
body:
  - type: input
    id: name
    attributes:
      label: Her name
      placeholder: e.g. Funmilayo Ransome-Kuti
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country or region
      placeholder: e.g. Nigeria, West Africa
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why should we feature her?
      description: What did she do? Why does her story matter?
      placeholder: Tell us about her contribution to history, rights, or social change in Africa.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Sources (if you have any)
      description: Links to Wikipedia, articles, or books about her.
      placeholder: https://en.wikipedia.org/wiki/...
    validations:
      required: false
