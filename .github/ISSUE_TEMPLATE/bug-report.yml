name: Bug Report
description: Report something that is broken or not working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we see the bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: e.g. Chrome on iPhone 15, Safari on MacBook
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If applicable, add a screenshot to help explain the problem.
    validations:
      required: false
